# Publishes the workspace to crates.io — the token-free, YubiKey-gated release path.
#
# Runs on push to master, but a cheap `gate` job first checks whether the merge actually
# bumped the shared workspace version (i.e. the release PR from release-plz-pr.yml was
# just merged). Only then does the `publish` job run — and it PAUSES on the protected
# `crates-io-publish` environment for manual approval. Approving requires a GitHub login,
# which you protect with a YubiKey passkey. So ordinary pushes never prompt for approval,
# and no release happens without your hardware key.
#
# Publishing authenticates via crates.io Trusted Publishing: rust-lang/crates-io-auth-action
# exchanges a GitHub OIDC token for a SHORT-LIVED crates.io token. No long-lived
# CARGO_REGISTRY_TOKEN is ever stored.
#
# NOTE: the very first publish (name reservation) is done locally with a one-time bootstrap
# token — Trusted Publishers can't be attached until the crates exist. See the plan's
# "Bootstrap runbook". This workflow drives every release after that.
name: Release

on:
  push:
    branches: [master]

concurrency:
  group: release-plz
  cancel-in-progress: false

jobs:
  # Did this push bump the shared workspace version? Comparing HEAD vs HEAD~1 is
  # message-independent (works with squash or merge commits) and keeps the protected
  # environment from prompting on non-release pushes.
  gate:
    name: Detect release
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.check.outputs.release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - id: check
        run: |
          cur="$(grep -m1 '^version = ' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          prev="$(git show HEAD~1:Cargo.toml 2>/dev/null | grep -m1 '^version = ' | sed -E 's/.*"([^"]+)".*/\1/' || true)"
          echo "current=$cur previous=${prev:-<none>}"
          if [ "$cur" != "$prev" ]; then
            echo "release=true" >> "$GITHUB_OUTPUT"
          else
            echo "release=false" >> "$GITHUB_OUTPUT"
          fi

  publish:
    name: Publish to crates.io
    needs: gate
    if: needs.gate.outputs.release == 'true'
    runs-on: ubuntu-latest
    environment: crates-io-publish   # manual-approval / YubiKey gate
    permissions:
      contents: write
      id-token: write                # required to mint the crates.io OIDC token
    steps:
      - name: Mint release-plz app token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ vars.RELEASE_PLZ_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_PLZ_APP_KEY }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-semver-checks

      # Trusted Publishing: exchange GitHub OIDC for a short-lived crates.io token.
      - name: Authenticate to crates.io (OIDC)
        uses: rust-lang/crates-io-auth-action@v1
        id: auth

      - name: Publish the workspace
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
